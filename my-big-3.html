<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Big 3</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big 3">
<meta name="theme-color" content="#0a0a0f">
<meta name="description" content="Your personalized sports dashboard — soccer, NFL, and NBA in one place.">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* Safe area for Android notch / gesture nav */
  :root {
    --sat: env(safe-area-inset-top, 0px);
    --sab: env(safe-area-inset-bottom, 0px);
    --sal: env(safe-area-inset-left, 0px);
    --sar: env(safe-area-inset-right, 0px);
  }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #ffffff0f;
    --border-lit: #ffffff1a;
    --text: #f0f0f5;
    --muted: #6b6b80;
    --accent-soccer: #00e676;
    --accent-nfl: #ff6b35;
    --accent-nba: #c45cff;
    --card-radius: 16px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #0a0a0fcc;
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    padding-left: calc(24px + var(--sal));
    padding-right: calc(24px + var(--sar));
    padding-top: var(--sat);
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: calc(60px + var(--sat));
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #fff 0%, #888 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .logo span {
    background: linear-gradient(90deg, var(--accent-soccer), var(--accent-nfl), var(--accent-nba));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .edit-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border-lit);
    color: var(--muted);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: all var(--transition);
  }
  .edit-btn:hover { color: var(--text); border-color: #ffffff30; }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--accent-soccer);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ── MAIN ── */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px calc(80px + var(--sab));
    padding-left: calc(24px + var(--sal));
    padding-right: calc(24px + var(--sar));
  }

  .dashboard-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  /* ── SEASON BADGE ── */
  .season-section-label {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    margin-top: 32px;
  }
  .season-section-label:first-of-type { margin-top: 0; }
  .season-pill {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 20px;
    text-transform: uppercase;
  }
  .pill-active {
    background: #00e67615;
    color: var(--accent-soccer);
    border: 1px solid #00e67630;
  }
  .pill-offseason {
    background: #ffffff08;
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .season-divider {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── TEAM CARDS ── */
  .cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--card-radius);
    overflow: hidden;
    transition: border-color var(--transition), transform var(--transition);
    position: relative;
  }
  .team-card:hover {
    border-color: var(--border-lit);
    transform: translateY(-2px);
  }
  .team-card.off-season { opacity: 0.65; }

  .card-accent-bar {
    height: 3px;
    width: 100%;
  }

  .card-header {
    padding: 18px 20px 14px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .team-identity {
    display: flex;
    align-items: center;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .team-logo {
    width: 48px;
    height: 48px;
    border-radius: 10px;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .team-meta { min-width: 0; }
  .team-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    line-height: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .team-sport-badge {
    display: inline-block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    margin-top: 4px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .next-game-block {
    text-align: right;
    flex-shrink: 0;
  }
  .next-game-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 2px;
  }
  .next-game-countdown {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    line-height: 1;
  }
  .next-game-date {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-cell {
    flex: 1;
    padding: 12px 16px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    line-height: 1;
  }
  .stat-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 3px;
  }

  /* ── NEWS SECTION ── */
  .news-section {
    padding: 16px 20px;
  }
  .news-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .news-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .news-loading {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
  }
  .news-spinner {
    width: 10px; height: 10px;
    border: 1.5px solid var(--border-lit);
    border-top-color: var(--muted);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .news-body {
    font-size: 13px;
    line-height: 1.6;
    color: #c0c0d0;
    min-height: 60px;
  }
  .news-body.loading-text { color: var(--muted); font-style: italic; }
  .news-error { color: #ff6b6b; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

  /* ── SCHEDULE STRIP ── */
  .schedule-strip {
    padding: 12px 20px 18px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .schedule-strip::-webkit-scrollbar { display: none; }
  .schedule-game {
    flex-shrink: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    min-width: 100px;
    text-align: center;
  }
  .schedule-game.next-up {
    border-color: var(--team-accent, #ffffff30);
  }
  .game-date {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .game-opponent {
    font-size: 12px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
  }
  .game-location {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── SPORT COLORS ── */
  .sport-soccer .card-accent-bar { background: linear-gradient(90deg, var(--accent-soccer), #00b248); }
  .sport-soccer .team-sport-badge { background: #00e67615; color: var(--accent-soccer); border: 1px solid #00e67630; }
  .sport-soccer .stat-value { color: var(--accent-soccer); }
  .sport-soccer { --team-accent: var(--accent-soccer); }

  .sport-nfl .card-accent-bar { background: linear-gradient(90deg, var(--accent-nfl), #c94a1a); }
  .sport-nfl .team-sport-badge { background: #ff6b3515; color: var(--accent-nfl); border: 1px solid #ff6b3530; }
  .sport-nfl .stat-value { color: var(--accent-nfl); }
  .sport-nfl { --team-accent: var(--accent-nfl); }

  .sport-nba .card-accent-bar { background: linear-gradient(90deg, var(--accent-nba), #8a3bbf); }
  .sport-nba .team-sport-badge { background: #c45cff15; color: var(--accent-nba); border: 1px solid #c45cff30; }
  .sport-nba .stat-value { color: var(--accent-nba); }
  .sport-nba { --team-accent: var(--accent-nba); }

  /* ── SETUP MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: #0a0a0fee;
    backdrop-filter: blur(12px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border-lit);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    padding: 36px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .modal-subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  .sport-section { margin-bottom: 28px; }
  .sport-label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    margin-bottom: 12px;
  }
  .sport-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .team-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .team-option {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
  }
  .team-option:hover { border-color: var(--border-lit); color: var(--text); }
  .team-option.selected { color: var(--text); }
  .team-option .opt-emoji { font-size: 16px; }

  .team-option.soccer-sel { border-color: var(--accent-soccer); background: #00e67608; color: var(--accent-soccer); }
  .team-option.nfl-sel { border-color: var(--accent-nfl); background: #ff6b3508; color: var(--accent-nfl); }
  .team-option.nba-sel { border-color: var(--accent-nba); background: #c45cff08; color: var(--accent-nba); }

  .modal-footer { margin-top: 32px; }
  .save-btn {
    width: 100%;
    padding: 14px;
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: opacity var(--transition);
  }
  .save-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .save-btn:not(:disabled):hover { opacity: 0.85; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 80px 24px;
  }
  .empty-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
  }
  .empty-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .empty-sub { color: var(--muted); font-size: 14px; line-height: 1.6; }

  /* ── REFRESH ROW ── */
  .refresh-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .refresh-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
  }

  @media (max-width: 600px) {
    main { padding: 20px 16px calc(60px + var(--sab)); }
    .cards-grid { grid-template-columns: 1fr; }
    .modal { padding: 24px; }
    .team-grid { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 16px; padding-top: var(--sat); }
  }

  /* ── INSTALL BANNER ── */
  .install-banner {
    position: fixed;
    bottom: calc(16px + var(--sab));
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--surface2);
    border: 1px solid var(--border-lit);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    z-index: 150;
    box-shadow: 0 8px 32px #00000080;
    transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-width: calc(100vw - 48px);
    width: 360px;
  }
  .install-banner.visible { transform: translateX(-50%) translateY(0); }
  .install-icon { font-size: 28px; flex-shrink: 0; }
  .install-text { flex: 1; min-width: 0; }
  .install-title { font-weight: 600; font-size: 14px; margin-bottom: 2px; }
  .install-sub { font-size: 12px; color: var(--muted); }
  .install-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .install-yes {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .install-no {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .install-no:hover { color: var(--text); }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">My <span>Big 3</span></div>
  <div class="header-right">
    <div class="live-dot"></div>
    <button class="edit-btn" onclick="openModal()">⚙ My Teams</button>
  </div>
</header>

<!-- SETUP MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Pick Your <span style="background: linear-gradient(90deg, var(--accent-soccer), var(--accent-nfl), var(--accent-nba)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">Big 3</span></div>
    <div class="modal-subtitle">Select one team per sport. Your dashboard will prioritize whoever's in season.</div>

    <div class="sport-section">
      <div class="sport-label"><div class="sport-dot" style="background: var(--accent-soccer)"></div> ⚽ Soccer</div>
      <div class="team-grid" id="soccerGrid"></div>
    </div>

    <div class="sport-section">
      <div class="sport-label"><div class="sport-dot" style="background: var(--accent-nfl)"></div> 🏈 NFL</div>
      <div class="team-grid" id="nflGrid"></div>
    </div>

    <div class="sport-section">
      <div class="sport-label"><div class="sport-dot" style="background: var(--accent-nba)"></div> 🏀 NBA</div>
      <div class="team-grid" id="nbaGrid"></div>
    </div>

    <div class="modal-footer">
      <button class="save-btn" id="saveBtn" onclick="saveTeams()" disabled>Save My Lineup</button>
    </div>
  </div>
</div>

<!-- MAIN DASHBOARD -->
<main>
  <div id="emptyState" class="empty-state hidden">
    <span class="empty-icon">🏆</span>
    <div class="empty-title">No Teams Yet</div>
    <div class="empty-sub">Click "My Teams" in the top right to pick your Big 3.</div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="dashboard-label">// Your Dashboard</div>
    <div class="refresh-row">
      <div class="refresh-time" id="lastUpdated"></div>
    </div>
    <div id="inSeasonSection"></div>
    <div id="offSeasonSection"></div>
  </div>
</main>

<!-- INSTALL BANNER -->
<div class="install-banner" id="installBanner">
  <div class="install-icon">🏆</div>
  <div class="install-text">
    <div class="install-title">Add to Home Screen</div>
    <div class="install-sub">Install My Big 3 for quick access</div>
  </div>
  <div class="install-actions">
    <button class="install-yes" id="installYes">Install</button>
    <button class="install-no" id="installNo">✕</button>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────────

const TEAMS = {
  soccer: [

    { id: 'barcelona', name: 'Barcelona', emoji: '🔴', league: 'La Liga' },

    { id: 'chelsea', name: 'Chelsea', emoji: '💙', league: 'Premier League' },
    { id: 'arsenal', name: 'Arsenal', emoji: '🔴', league: 'Premier League' },
    { id: 'psg', name: 'PSG', emoji: '🗼', league: 'Ligue 1' },
    { id: 'atletico', name: 'Atlético Madrid', emoji: '🔴', league: 'La Liga' },
    { id: 'inter', name: 'Inter Milan', emoji: '⚫', league: 'Serie A' },
    { id: 'juventus', name: 'Juventus', emoji: '⚫', league: 'Serie A' },
    { id: 'america', name: 'Club América', emoji: '🦅', league: 'Liga MX' },
    { id: 'cruz_azul', name: 'Cruz Azul', emoji: '💎', league: 'Liga MX' },
    { id: 'chivas', name: 'Chivas', emoji: '🐐', league: 'Liga MX' },
    { id: 'tigres', name: 'Tigres', emoji: '🐯', league: 'Liga MX' },
  ],
  nfl: [
    { id: 'chiefs', name: 'Chiefs', emoji: '⚔️', city: 'Kansas City' },
    { id: '49ers', name: '49ers', emoji: '⛏️', city: 'San Francisco' },
    { id: 'cowboys', name: 'Cowboys', emoji: '⭐', city: 'Dallas' },
    { id: 'eagles', name: 'Eagles', emoji: '🦅', city: 'Philadelphia' },
    { id: 'bills', name: 'Bills', emoji: '🐃', city: 'Buffalo' },
    { id: 'ravens', name: 'Ravens', emoji: '🐦', city: 'Baltimore' },
    { id: 'packers', name: 'Packers', emoji: '🧀', city: 'Green Bay' },
    { id: 'steelers', name: 'Steelers', emoji: '🔶', city: 'Pittsburgh' },
    { id: 'patriots', name: 'Patriots', emoji: '🎖️', city: 'New England' },
    { id: 'dolphins', name: 'Dolphins', emoji: '🐬', city: 'Miami' },
  ],
  nba: [
    { id: 'lakers', name: 'Lakers', emoji: '💜', city: 'Los Angeles' },
    { id: 'celtics', name: 'Celtics', emoji: '☘️', city: 'Boston' },
    { id: 'warriors', name: 'Warriors', emoji: '🌉', city: 'Golden State' },
    { id: 'heat', name: 'Heat', emoji: '🔥', city: 'Miami' },
    { id: 'bucks', name: 'Bucks', emoji: '🦌', city: 'Milwaukee' },
    { id: 'nuggets', name: 'Nuggets', emoji: '⛏️', city: 'Denver' },
    { id: 'suns', name: 'Suns', emoji: '☀️', city: 'Phoenix' },
    { id: 'clippers', name: 'Clippers', emoji: '⛵', city: 'LA' },
    { id: 'knicks', name: 'Knicks', emoji: '🗽', city: 'New York' },
    { id: 'nets', name: 'Nets', emoji: '🕸️', city: 'Brooklyn' },
    { id: 'mavs', name: 'Mavericks', emoji: '🐴', city: 'Dallas' },
    { id: 'spurs', name: 'Spurs', emoji: '⚙️', city: 'San Antonio' },
  ]
};

// Season status (June 2026): NFL offseason, NBA Finals just ended, Soccer varies
const SEASON_STATUS = {
  soccer: { inSeason: true, label: 'In Season' },
  nfl: { inSeason: false, label: 'Off-Season · Preseason Aug' },
  nba: { inSeason: false, label: 'Off-Season · Draft Jun 26' }
};

// Mock schedule data
function getMockSchedule(teamId, sport) {
  const games = [];
  const opponents = {
    soccer: ['vs Villarreal', '@ Sevilla', 'vs Valencia', '@ Betis', 'vs Celta'],
    nfl: ['vs DAL', '@ KC', 'vs BUF', '@ PHI', 'vs MIA'],
    nba: ['@ BOS', 'vs MIL', 'vs PHX', '@ DEN', 'vs GSW']
  };
  const dates = [3, 7, 14, 21, 28];
  const now = new Date();
  for (let i = 0; i < 5; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() + dates[i]);
    games.push({
      date: d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }),
      opponent: (opponents[sport] || opponents.soccer)[i],
      location: i % 2 === 0 ? 'Home' : 'Away'
    });
  }
  return games;
}

function getMockStats(teamId, sport) {
  const stats = {
    soccer: [
      { value: '14W', label: 'Wins' },
      { value: '4D', label: 'Draws' },
      { value: '3L', label: 'Losses' },
    ],
    nfl: [
      { value: '0-0', label: 'Record' },
      { value: '—', label: 'Conf Rank' },
      { value: 'Pre', label: 'Season' },
    ],
    nba: [
      { value: '47W', label: 'Wins' },
      { value: '35L', label: 'Losses' },
      { value: '6th', label: 'Conf' },
    ]
  };
  return stats[sport] || stats.soccer;
}

// ── STATE ─────────────────────────────────────────────────────────────────────

let selections = { soccer: null, nfl: null, nba: null };
let savedTeams = null;

function loadSaved() {
  try {
    const raw = localStorage.getItem('big3_teams');
    if (raw) savedTeams = JSON.parse(raw);
  } catch(e) {}
}

// ── MODAL ─────────────────────────────────────────────────────────────────────

function buildModal() {
  buildGrid('soccerGrid', 'soccer', TEAMS.soccer);
  buildGrid('nflGrid', 'nfl', TEAMS.nfl);
  buildGrid('nbaGrid', 'nba', TEAMS.nba);
}

function buildGrid(containerId, sport, teams) {
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  teams.forEach(team => {
    const el = document.createElement('div');
    el.className = 'team-option';
    el.dataset.sport = sport;
    el.dataset.id = team.id;
    el.innerHTML = `<span class="opt-emoji">${team.emoji}</span> ${team.name}`;

    // Pre-select if saved
    if (savedTeams && savedTeams[sport]?.id === team.id) {
      selections[sport] = team;
      el.classList.add(`${sport}-sel`, 'selected');
    }

    el.addEventListener('click', () => selectTeam(sport, team, el));
    container.appendChild(el);
  });
}

function selectTeam(sport, team, el) {
  // Deselect others in sport
  document.querySelectorAll(`[data-sport="${sport}"]`).forEach(o => {
    o.classList.remove(`${sport}-sel`, 'selected');
  });
  el.classList.add(`${sport}-sel`, 'selected');
  selections[sport] = team;
  updateSaveBtn();
}

function updateSaveBtn() {
  const btn = document.getElementById('saveBtn');
  const allSelected = selections.soccer && selections.nfl && selections.nba;
  btn.disabled = !allSelected;
}

function openModal() {
  document.getElementById('modalOverlay').classList.remove('hidden');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.add('hidden');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function saveTeams() {
  savedTeams = {
    soccer: { ...TEAMS.soccer.find(t => t.id === selections.soccer.id), sport: 'soccer' },
    nfl: { ...TEAMS.nfl.find(t => t.id === selections.nfl.id), sport: 'nfl' },
    nba: { ...TEAMS.nba.find(t => t.id === selections.nba.id), sport: 'nba' }
  };
  try { localStorage.setItem('big3_teams', JSON.stringify(savedTeams)); } catch(e) {}
  closeModal();
  renderDashboard();
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────────

function renderDashboard() {
  if (!savedTeams) {
    document.getElementById('emptyState').classList.remove('hidden');
    document.getElementById('dashboard').classList.add('hidden');
    return;
  }

  document.getElementById('emptyState').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');

  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    `Updated ${now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}`;

  const sports = ['soccer', 'nfl', 'nba'];
  const inSeason = sports.filter(s => SEASON_STATUS[s].inSeason);
  const offSeason = sports.filter(s => !SEASON_STATUS[s].inSeason);

  const inSeasonSection = document.getElementById('inSeasonSection');
  const offSeasonSection = document.getElementById('offSeasonSection');
  inSeasonSection.innerHTML = '';
  offSeasonSection.innerHTML = '';

  if (inSeason.length > 0) {
    const label = makeSectionLabel('In Season', true);
    inSeasonSection.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    inSeason.forEach(sport => {
      const team = savedTeams[sport];
      grid.appendChild(makeCard(team, sport, true));
    });
    inSeasonSection.appendChild(grid);
  }

  if (offSeason.length > 0) {
    const label = makeSectionLabel('Off-Season', false);
    offSeasonSection.appendChild(label);
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    offSeason.forEach(sport => {
      const team = savedTeams[sport];
      grid.appendChild(makeCard(team, sport, false));
    });
    offSeasonSection.appendChild(grid);
  }

  // Trigger AI news for all cards
  sports.forEach(sport => {
    if (savedTeams[sport]) fetchNews(savedTeams[sport], sport);
  });
}

function makeSectionLabel(text, active) {
  const div = document.createElement('div');
  div.className = 'season-section-label';
  div.innerHTML = `
    <div class="season-pill ${active ? 'pill-active' : 'pill-offseason'}">${text}</div>
    <div class="season-divider"></div>
  `;
  return div;
}

function makeCard(team, sport, inSeason) {
  const sportLabel = sport === 'soccer' ? '⚽ Soccer' : sport === 'nfl' ? '🏈 NFL' : '🏀 NBA';
  const stats = getMockStats(team.id, sport);
  const schedule = getMockSchedule(team.id, sport);
  const nextGame = schedule[0];
  const daysUntil = [3,7,14,21,28][0];

  const card = document.createElement('div');
  card.className = `team-card sport-${sport} ${inSeason ? '' : 'off-season'}`;
  card.id = `card-${sport}`;

  const scheduleHTML = schedule.map((g, i) => `
    <div class="schedule-game ${i === 0 ? 'next-up' : ''}">
      <div class="game-date">${g.date}</div>
      <div class="game-opponent">${g.opponent}</div>
      <div class="game-location">${g.location}</div>
    </div>
  `).join('');

  const statsHTML = stats.map(s => `
    <div class="stat-cell">
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
    </div>
  `).join('');

  card.innerHTML = `
    <div class="card-accent-bar"></div>
    <div class="card-header">
      <div class="team-identity">
        <div class="team-logo">${team.emoji}</div>
        <div class="team-meta">
          <div class="team-name">${team.name}</div>
          <div class="team-sport-badge">${sportLabel}</div>
        </div>
      </div>
      <div class="next-game-block">
        <div class="next-game-label">Next Game</div>
        <div class="next-game-countdown">${inSeason ? `${daysUntil}d` : '—'}</div>
        <div class="next-game-date">${inSeason ? nextGame.date : SEASON_STATUS[sport].label}</div>
      </div>
    </div>
    <div class="stats-row">${statsHTML}</div>
    <div class="news-section">
      <div class="news-header">
        <div class="news-title">📰 News & Rumors</div>
        <div class="news-loading" id="loader-${sport}">
          <div class="news-spinner"></div> Loading
        </div>
      </div>
      <div class="news-body loading-text" id="news-${sport}">Fetching latest intel on ${team.name}…</div>
    </div>
    <div class="schedule-strip">${scheduleHTML}</div>
  `;

  return card;
}

// ── AI NEWS ───────────────────────────────────────────────────────────────────

async function fetchNews(team, sport) {
  const newsEl = document.getElementById(`news-${sport}`);
  const loaderEl = document.getElementById(`loader-${sport}`);
  if (!newsEl) return;

  const sportFull = sport === 'soccer' ? 'soccer/football' : sport.toUpperCase();
  const prompt = `You are a sharp sports analyst. Give a 3-sentence update on ${team.name} (${sportFull}): (1) recent performance or current standing, (2) a notable trade rumor, roster move, or storyline right now, and (3) what to watch in their next game or the coming weeks. Be specific, current-feeling, and punchy. No bullet points, just flowing sentences.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    const text = data?.content?.[0]?.text || 'No update available.';
    newsEl.textContent = text;
    newsEl.classList.remove('loading-text');
    if (loaderEl) loaderEl.style.display = 'none';
  } catch (err) {
    newsEl.innerHTML = `<span class="news-error">⚠ Could not fetch news — check connection.</span>`;
    if (loaderEl) loaderEl.style.display = 'none';
  }
}

// ── PWA: SERVICE WORKER ───────────────────────────────────────────────────────

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── PWA: INSTALL PROMPT ───────────────────────────────────────────────────────

let deferredPrompt = null;
const installBanner = document.getElementById('installBanner');
const installYes = document.getElementById('installYes');
const installNo = document.getElementById('installNo');

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show banner after a short delay
  setTimeout(() => {
    installBanner.classList.add('visible');
  }, 2500);
});

installYes.addEventListener('click', async () => {
  installBanner.classList.remove('visible');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    const { outcome } = await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

installNo.addEventListener('click', () => {
  installBanner.classList.remove('visible');
  deferredPrompt = null;
});

window.addEventListener('appinstalled', () => {
  installBanner.classList.remove('visible');
  deferredPrompt = null;
});

// ── INIT ──────────────────────────────────────────────────────────────────────

function init() {
  loadSaved();
  buildModal();

  if (savedTeams) {
    // Sync selections for modal
    ['soccer', 'nfl', 'nba'].forEach(sport => {
      if (savedTeams[sport]) selections[sport] = savedTeams[sport];
    });
    renderDashboard();
  } else {
    openModal();
    document.getElementById('emptyState').classList.add('hidden');
    document.getElementById('dashboard').classList.add('hidden');
  }
}

init();
</script>
